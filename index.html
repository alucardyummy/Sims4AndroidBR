
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sims4AndroidBR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">Sims4AndroidBR</div>
  <button class="btn">Guia</button>
</header>

<main>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <h1>Guia Completo</h1>
      <p>Rode The Sims 4 no Android com mods, passo a passo</p>
      <button class="primary">Começar</button>
    </div>
  </section>

  <!-- CARDS -->
  <section class="grid">
    
    <div class="card">
      <h3>Download</h3>
      <p>Baixar jogo + apps necessários</p>
    </div>

    <div class="card">
      <h3>Instalação</h3>
      <p>Configurar GameHub corretamente</p>
    </div>

    <div class="card">
      <h3>Mods</h3>
      <p>Como instalar WickedWhims e CC</p>
    </div>

    <div class="card">
      <h3>Problemas</h3>
      <p>Corrigir bugs comuns</p>
    </div>

  </section>

</main>

</body>
</html>
